<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot booking layout</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="stick">
        <nav>
            <span><img src="book.png" alt=""></span>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Pricing</li>
                <li>Contact-us</li>
                <li>Booking</li>

            </ul>

        </nav>
    </header>
    <div class="heading">
     <span>  Book your study slot. </span> 
    <span>Reserve your perfect study space in just a few clicks!</span>
    </div>
    <div id="rooms-container">
        <div class="room">
            <h2>Room-A</h2>
            <p>Capacity:4</p>
            <p>Location: Floor 1</p>

            <button class="slot" data-room="Room-A" data-time="9:00am-10:00am">9:00am-10:00am</button>
            <button class="slot" data-room="Room-A" data-time="10:00am-11:00am">10:00am-11:00am</button>
            <button class="slot" data-room="Room-A" data-time="11:00am-12:00pm">11:00am-12:00pm</button>
            <button class="slot" data-room="Room-A" data-time="4:00pm-5:00pm">4:00pm-5:00pm</button>
            <button class="slot" data-room="Room-A" data-time="5:00pm-6:00pm">5:00pm-6:00pm</button>
            <button class="slot" data-room="Room-A" data-time="6:00pm-7:00pm">6:00pm-7:00pm</button>
        </div>
        <div class="room">
            <h2>Room-B</h2>
            <p>Capacity:6</p>
            <p>Location: Floor 2</p>

            <button class="slot" data-room="Room-B" data-time="9:00am-10:00am">9:00am-10:00am</button>
            <button class="slot" data-room="Room-B" data-time="10:00am-11:00am">10:00am-11:00am</button>
            <button class="slot" data-room="Room-B" data-time="11:00am-12:00pm">11:00am-12:00pm</button>
            <button class="slot" data-room="Room-B" data-time="4:00pm-5:00pm">4:00pm-5:00pm</button>
            <button class="slot" data-room="Room-B" data-time="5:00pm-6:00pm">5:00pm-6:00pm</button>
            <button class="slot" data-room="Room-B" data-time="6:00pm-7:00pm">6:00pm-7:00pm</button>
        </div>
        <div class="room">
            <h2>Room-C</h2>
            <p>Capacity:B</p>
            <p>Location: Floor 3</p>

            <button class="slot" data-room="Room-C" data-time="9:00am-10:00am">9:00am-10:00am</button>
            <button class="slot" data-room="Room-C" data-time="10:00am-11:00am">10:00am-11:00am</button>
            <button class="slot" data-room="Room-C" data-time="11:00am-12:00pm">11:00am-12:00pm</button>
            <button class="slot" data-room="Room-C" data-time="4:00pm-5:00pm">4:00pm-5:00pm</button>
            <button class="slot" data-room="Room-C" data-time="5:00pm-6:00pm">5:00pm-6:00pm</button>
            <button class="slot" data-room="Room-C" data-time="6:00pm-7:00pm">6:00pm-7:00pm</button>
        </div>


    </div>
    <script src="script.js"></script>
</body>

</html>
